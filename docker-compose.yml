services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cardgame-backend
    ports:
      - "8082:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/data/cardgame;AUTO_SERVER=TRUE
    volumes:
      - h2-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cardgame-frontend
    ports:
      - "8083:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  h2-data:
